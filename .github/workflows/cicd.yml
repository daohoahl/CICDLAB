name: CI-CD Pipeline

on:
  push:
    branches: [ "develop" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name:  Checkout
      uses: actions/checkout@v3

    - name:  Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name:  Install
      run: npm install

    - name:  Test
      run: npm test

    - name:  Build
      run: npm run build

    - name:  Deploy local
      run: |
        echo "Deploying..."
        mkdir -p ~/deploy-demo
        cp -r . ~/deploy-demo
        echo "Deploy done"
